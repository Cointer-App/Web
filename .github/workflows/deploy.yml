name: Deploy to server

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.COINTER_CORE_IP }}
          port: ${{ secrets.COINTER_CORE_PORT }}
          username: ${{ secrets.COINTER_CORE_USER }}
          key: ${{ secrets.COINTER_CORE_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"
            cd /opt/cointer-web
            git pull origin main
            bun install --frozen-lockfile
            VITE_API_URL=https://api.cointer.app bun run build
            sudo systemctl restart cointer-web
